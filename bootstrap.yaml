AWSTemplateFormatVersion: '2010-09-09'
Description: >
  One-time bootstrap stack for news-notifications.
  Creates the GitHub Actions OIDC provider and deploy role.
  Deploy this manually once, then all future deploys run via GitHub Actions.

Parameters:
  GitHubOrg:
    Type: String
    Default: noahp-info
  GitHubRepo:
    Type: String
    Default: news-notifications
  GitHubBranch:
    Type: String
    Default: master

Resources:

  GitHubOIDCProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        # GitHub Actions OIDC thumbprint (stable, maintained by GitHub)
        - 6938fd4d98bab03faadb97b34396831e3780aea1
        - 1c58a3a8518e8759bf075b76b750d4f2df264fcd

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsNewsNotificationsDeploy
      Description: Assumed by GitHub Actions to deploy the news-notifications SAM stack
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !GetAtt GitHubOIDCProvider.Arn
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                # Scoped to this repo and branch only
                token.actions.githubusercontent.com:sub:
                  !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}"
      Policies:
        - PolicyName: SAMDeployPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:

              - Sid: CloudFormationDeploy
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeStackResource
                  - cloudformation:DescribeStackResources
                  - cloudformation:GetTemplate
                  - cloudformation:GetTemplateSummary
                  - cloudformation:ValidateTemplate
                  - cloudformation:CreateChangeSet
                  - cloudformation:DescribeChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ListStackResources
                Resource: "*"

              - Sid: SAMManagedS3Bucket
                Effect: Allow
                Action:
                  - s3:CreateBucket
                  - s3:PutBucketVersioning
                  - s3:PutEncryptionConfiguration
                  - s3:GetEncryptionConfiguration
                  - s3:GetBucketVersioning
                  - s3:GetBucketPolicy
                  - s3:PutBucketPolicy
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - arn:aws:s3:::aws-sam-cli-managed-default-*
                  - arn:aws:s3:::aws-sam-cli-managed-default-*/*

              - Sid: LambdaFunctionsAndLayers
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:PublishLayerVersion
                  - lambda:GetLayerVersion
                  - lambda:DeleteLayerVersion
                  - lambda:ListLayerVersions
                Resource: "*"

              - Sid: IAMRolesForLambdaAndScheduler
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:PassRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/*"

              - Sid: SNSTopicAndSubscription
                Effect: Allow
                Action:
                  - sns:CreateTopic
                  - sns:DeleteTopic
                  - sns:GetTopicAttributes
                  - sns:SetTopicAttributes
                  - sns:Subscribe
                  - sns:Unsubscribe
                  - sns:GetSubscriptionAttributes
                  - sns:TagResource
                Resource: "*"

              - Sid: EventBridgeScheduler
                Effect: Allow
                Action:
                  - scheduler:CreateSchedule
                  - scheduler:UpdateSchedule
                  - scheduler:DeleteSchedule
                  - scheduler:GetSchedule
                  - scheduler:ListSchedules
                  - scheduler:CreateScheduleGroup
                  - scheduler:DeleteScheduleGroup
                  - scheduler:GetScheduleGroup
                  - scheduler:TagResource
                Resource: "*"

              - Sid: CloudWatchLogsForLambda
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:DeleteLogGroup
                  - logs:PutRetentionPolicy
                  - logs:DeleteRetentionPolicy
                  - logs:DescribeLogGroups
                  - logs:TagLogGroup
                Resource: !Sub "arn:aws:logs:us-east-1:${AWS::AccountId}:log-group:*"

Outputs:
  DeployRoleArn:
    Description: ARN to paste into .github/workflows/deploy.yml
    Value: !GetAtt GitHubActionsDeployRole.Arn
